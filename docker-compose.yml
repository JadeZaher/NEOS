version: "3.9"

# Local dev compose for the NEOS monorepo.
# Run with:  ./dev-docker.sh   (or: docker compose up --build)
#
# Backend env:   neos-operating-system/agent/.env
# Frontend env:  charting-the-course/.env  (VITE_* vars baked at build time via build args)

services:
  neos-api:
    build:
      context: ./neos-operating-system
      dockerfile: agent/Dockerfile
    image: neos-api:local
    container_name: neos-api
    restart: unless-stopped
    env_file:
      - ./neos-operating-system/agent/.env
    volumes:
      # Mount neos-core live so edits are reflected without rebuild
      - ./neos-operating-system/neos-core:/app/neos-core
    ports:
      - "8000:8000"
    networks:
      - neos-net

  neos-frontend:
    build:
      context: ./charting-the-course
      dockerfile: Dockerfile
      args:
        # Override the API URL so the frontend talks to the backend container.
        # For production, replace with your real API URL.
        VITE_API_URL: ${VITE_API_URL:-http://neos-api:8000}
    image: neos-frontend:local
    container_name: neos-frontend
    restart: unless-stopped
    env_file:
      - ./charting-the-course/.env
    ports:
      - "3000:3000"
    depends_on:
      - neos-api
    networks:
      - neos-net

networks:
  neos-net:
    driver: bridge
